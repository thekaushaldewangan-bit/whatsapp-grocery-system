version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: whatsapp-grocery-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: whatsapp-grocery
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-grocery-backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/whatsapp-grocery
      - NODE_ENV=development
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - DEMO_MODE=true
      - UPI_ID=demo@upi
      - SHOP_NAME=Grocery Store
      - SHOP_PHONE=9999999999
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: whatsapp-grocery-admin
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
